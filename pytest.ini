[pytest]
# Tests are pure-unit (no DB, no network) for now; detector integration tests
# will live under tests/ too and build an in-memory SQLite via db.connect().
# pythonpath = . lets `import lol_coach...` resolve without installing the package
# (the project is run-in-place, stdlib-only).
pythonpath = .
testpaths = tests
addopts = -q
